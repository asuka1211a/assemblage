<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アセンブリッジのアセンブリッジ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f4f0;min-height:100vh;padding:24px 20px;}
h1{font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:14px;letter-spacing:0.03em;}
#board{position:relative;width:100%;min-height:800px;background:#eeecea;border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);overflow:hidden;}
#board.mode-note{cursor:crosshair;}
#board.mode-delete .photo-card{outline:1.5px dashed #e24b4a;}
.photo-card{position:absolute;background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:3px;padding:5px;cursor:grab;user-select:none;z-index:2;}
.photo-card:active{cursor:grabbing;}
.card-img{display:block;width:100%;height:auto;pointer-events:none;border-radius:1px;}
.card-del{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:#fcebeb;color:#a32d2d;font-size:10px;display:none;align-items:center;justify-content:center;cursor:pointer;border:0.5px solid #f09595;}
.mode-delete .card-del{display:flex;}
.note-dot{position:absolute;width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.15);cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(0,0,0,0.4);transition:transform 0.1s;}
.note-dot:hover{transform:scale(1.2);}
.note-dot.active{transform:scale(1.15);border-width:2px;}
.note-popup{position:absolute;width:185px;border-radius:2px;padding:9px 11px 11px;font-size:12px;line-height:1.65;z-index:300;display:none;pointer-events:none;}
.note-popup.visible{display:block;}
.note-author-tag{font-size:10px;font-weight:500;margin-bottom:5px;display:inline-block;padding:1px 7px;border-radius:20px;}
.note-del{position:absolute;top:5px;right:6px;font-size:10px;cursor:pointer;opacity:0;color:rgba(0,0,0,0.35);pointer-events:auto;}
.mode-delete .note-popup.visible .note-del{opacity:1;}
.conn-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
#hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:#aaa;pointer-events:none;white-space:nowrap;}
button{font-size:12px;padding:6px 14px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:transparent;cursor:pointer;color:#1a1a1a;}
button:hover{background:rgba(0,0,0,0.05);}
button.on{background:#e6f1fb;color:#185fa5;border-color:#85b7eb;}
button.del-on{background:#fcebeb;color:#a32d2d;border-color:#f09595;}
.toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:stretch;}
.up-label{flex:1;min-width:160px;border:1.5px dashed rgba(0,0,0,0.2);border-radius:8px;padding:6px 14px;text-align:center;cursor:pointer;color:#666;font-size:12px;display:flex;align-items:center;justify-content:center;}
.up-label:hover{background:rgba(0,0,0,0.04);}
.author-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.author-bar span{font-size:12px;color:#666;}
.author-bar input{width:160px;font-size:13px;padding:5px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;outline:none;}
.author-bar input:focus{border-color:rgba(0,0,0,0.4);}
.author-preview{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:12px;padding:20px;width:300px;display:flex;flex-direction:column;gap:12px;}
.modal label{font-size:12px;color:#666;}
.modal textarea{width:100%;height:84px;resize:vertical;font-size:13px;padding:8px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;outline:none;font-family:inherit;}
.modal textarea:focus{border-color:rgba(0,0,0,0.4);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.modal-btns button{font-size:12px;padding:6px 14px;}
.color-row{display:flex;gap:7px;flex-wrap:wrap;}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.1s;}
.sw:hover{transform:scale(1.2);}
.sw.sel{border-color:#1a1a1a;}
</style>
</head>
<body>

<h1>アセンブリッジのアセンブリッジ</h1>

<div class="author-bar">
  <span>追加者名：</span>
  <input type="text" id="authorInput" placeholder="あなたの名前" value="あすか">
  <div class="author-preview" id="authorPreview" style="background:#FAEEDA;color:#412402;">あすか</div>
</div>

<div class="toolbar">
  <label class="up-label" id="upLabel">
    写真を追加
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
  </label>
  <button id="noteBtn">付箋モード</button>
  <button id="shuffleBtn">ランダム配置</button>
  <button id="delBtn">削除モード</button>
</div>

<div id="board">
  <svg class="conn-svg" id="connSvg"></svg>
  <span id="hint">写真をドラッグ ／ 付箋モード→クリックで配置 ／ 付箋をダブルクリックで編集</span>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <label>付箋の内容</label>
    <textarea id="edBody" placeholder="気づき・解釈・感じたことを書く"></textarea>
    <label>色</label>
    <div class="color-row" id="swatches"></div>
    <div class="modal-btns">
      <button id="edCancel">キャンセル</button>
      <button id="edSave">保存</button>
    </div>
  </div>
</div>

const board=document.getElementById('board'),connSvg=document.getElementById('connSvg'),modalOverlay=document.getElementById('modalOverlay'),authorInput=document.getElementById('authorInput'),authorPreview=document.getElementById('authorPreview');
const COLORS=[
  {bg:'#FAEEDA',bd:'#FAC775',tx:'#412402'},
  {bg:'#FBEAF0',bd:'#F4C0D1',tx:'#4B1528'},
  {bg:'#E1F5EE',bd:'#9FE1CB',tx:'#04342C'},
  {bg:'#E6F1FB',bd:'#B5D4F4',tx:'#042C53'},
  {bg:'#EEEDFE',bd:'#CECBF6',tx:'#26215C'},
  {bg:'#FAECE7',bd:'#F5C4B3',tx:'#4A1B0C'},
  {bg:'#EAF3DE',bd:'#C0DD97',tx:'#173404'},
];
const AUTHOR_COLORS=[
  {bg:'#FAEEDA',tx:'#412402'},{bg:'#FBEAF0',tx:'#4B1528'},
  {bg:'#E1F5EE',tx:'#04342C'},{bg:'#E6F1FB',tx:'#042C53'},
  {bg:'#EEEDFE',tx:'#26215C'},{bg:'#EAF3DE',tx:'#173404'},
  {bg:'#FAECE7',tx:'#4A1B0C'},
];
const authorColorMap={};
function getAC(n){if(!authorColorMap[n])authorColorMap[n]=AUTHOR_COLORS[Object.keys(authorColorMap).length%AUTHOR_COLORS.length];return authorColorMap[n];}
getAC('あすか');
function randColor(){return COLORS[Math.floor(Math.random()*COLORS.length)];}
let cards=[],noteIdCnt=100,cardIdCnt=100,modeNote=false,modeDelete=false,editing=null,selColor=0;

const swBox=document.getElementById('swatches');
COLORS.forEach((c,i)=>{
  const s=document.createElement('div');s.className='sw'+(i===0?' sel':'');
  s.style.cssText=`background:${c.bg};border-color:${c.bd};`;
  s.addEventListener('click',()=>{document.querySelectorAll('.sw').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');selColor=i;});
  swBox.appendChild(s);
});
authorInput.addEventListener('input',()=>{const n=authorInput.value||'名無し';const ac=getAC(n);authorPreview.textContent=n;authorPreview.style.background=ac.bg;authorPreview.style.color=ac.tx;});
function currentAuthor(){return authorInput.value.trim()||'名無し';}
function closeNotes(){document.querySelectorAll('.note-dot').forEach(d=>d.classList.remove('active'));document.querySelectorAll('.note-popup').forEach(p=>p.classList.remove('visible'));}
function drawConn(){
  if(cards.length<2){connSvg.innerHTML='';return;}
  let p='';
  for(let i=0;i<cards.length;i++)for(let j=i+1;j<cards.length;j++){
    const a=cards[i].data,b=cards[j].data;
    const x1=a.x+a.w/2,y1=a.y+a.h/2,x2=b.x+b.w/2,y2=b.y+b.h/2;
    const dx=b.x-a.x,dy=b.y-a.y,len=Math.sqrt(dx*dx+dy*dy)||1;
    const cv=Math.min(40,len*0.18),cx=(x1+x2)/2-dy/len*cv,cy=(y1+y2)/2+dx/len*cv;
    p+=`<path d="M${x1},${y1} Q${cx},${cy} ${x2},${y2}" stroke="#C4C2BA" stroke-width="0.8" fill="none" stroke-dasharray="4,5" opacity="0.5"/>`;
  }
  connSvg.innerHTML=p;
}
function positionPopup(pop,note,cd){
  let lx=cd.x+note.bx+22,ly=cd.y+note.by-4;
  if(lx+190>board.offsetWidth-10)lx=cd.x+note.bx-198;
  if(ly+130>board.offsetHeight-10)ly=board.offsetHeight-140;
  pop.style.left=lx+'px';pop.style.top=ly+'px';
}
function buildPopContent(pop,note){
  const ac=getAC(note.author),del=document.createElement('span');
  del.className='note-del';del.textContent='×';
  pop.innerHTML=`<div class="note-author-tag" style="background:${ac.bg};color:${ac.tx};">${note.author}</div><div style="margin-top:4px;">${note.text}</div>`;
  pop.appendChild(del);return del;
}
function makeDot(note,cd){
  const dot=document.createElement('div');dot.className='note-dot';
  dot.style.cssText=`left:${note.bx}px;top:${note.by}px;background:${note.color.bg};border-color:${note.color.bd};`;
  dot.textContent='+';
  const pop=document.createElement('div');pop.className='note-popup';pop.id='pop_'+note.id;
  pop.style.cssText=`transform:rotate(${(Math.random()*5-2.5).toFixed(1)}deg);background:${note.color.bg};border:1px solid ${note.color.bd};color:${note.color.tx};`;
  const del=buildPopContent(pop,note);
  del.addEventListener('click',(e)=>{e.stopPropagation();dot.remove();pop.remove();cd.notes=cd.notes.filter(n=>n.id!==note.id);});
  dot.addEventListener('click',(e)=>{if(modeNote||modeDelete)return;e.stopPropagation();const was=dot.classList.contains('active');closeNotes();if(!was){dot.classList.add('active');positionPopup(pop,note,cd);pop.classList.add('visible');}});
  dot.addEventListener('dblclick',(e)=>{if(modeNote||modeDelete)return;e.stopPropagation();editing={note,cd,dot,pop};document.getElementById('edBody').value=note.text;selColor=Math.max(0,COLORS.indexOf(note.color));document.querySelectorAll('.sw').forEach((s,i)=>s.classList.toggle('sel',i===selColor));modalOverlay.classList.add('open');});
  let sx,sy,sox,soy;
  dot.addEventListener('mousedown',(e)=>{if(modeNote||modeDelete)return;e.stopPropagation();e.preventDefault();sx=e.clientX;sy=e.clientY;sox=parseInt(dot.style.left);soy=parseInt(dot.style.top);
    const mv=(e)=>{const cel=dot.closest('.photo-card');const nx=Math.max(0,Math.min(cel?cel.offsetWidth-10:300,sox+e.clientX-sx));const ny=Math.max(0,Math.min(cel?cel.offsetHeight-10:300,soy+e.clientY-sy));dot.style.left=nx+'px';dot.style.top=ny+'px';note.bx=nx;note.by=ny;if(pop.classList.contains('visible'))positionPopup(pop,note,cd);};
    const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);});
  board.appendChild(pop);return dot;
}
function createCard(data){
  const el=document.createElement('div');el.className='photo-card';el.id=data.id;
  el.style.cssText=`left:${data.x}px;top:${data.y}px;width:${data.w}px;`;
  const img=document.createElement('img');img.className='card-img';img.src=data.img;img.draggable=false;
  img.style.width=(data.w-10)+'px';
  img.onload=()=>{data.h=Math.round(img.naturalHeight*(data.w-10)/img.naturalWidth);el.style.height=(data.h+10)+'px';drawConn();};
  el.appendChild(img);
  const del=document.createElement('div');del.className='card-del';del.textContent='×';
  del.addEventListener('click',(e)=>{e.stopPropagation();data.notes.forEach(n=>{const p=document.getElementById('pop_'+n.id);if(p)p.remove();});el.remove();cards=cards.filter(c=>c.data.id!==data.id);drawConn();});
  el.appendChild(del);
  data.notes.forEach(n=>el.appendChild(makeDot(n,data)));
  let sx,sy,sl,st;
  el.addEventListener('mousedown',(e)=>{if(modeNote||modeDelete)return;if(e.target.classList.contains('note-dot')||e.target.classList.contains('card-del'))return;e.preventDefault();sx=e.clientX;sy=e.clientY;sl=parseInt(el.style.left);st=parseInt(el.style.top);el.style.zIndex=100;
    const mv=(e)=>{const br=board.getBoundingClientRect();const nl=Math.max(0,Math.min(br.width-data.w-8,sl+e.clientX-sx));const nt=Math.max(0,Math.min(br.height-data.h-10,st+e.clientY-sy));el.style.left=nl+'px';el.style.top=nt+'px';data.x=nl;data.y=nt;drawConn();data.notes.forEach(n=>{const p=document.getElementById('pop_'+n.id);if(p&&p.classList.contains('visible'))positionPopup(p,n,data);});};
    const up=()=>{el.style.zIndex=2;document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);});
  board.appendChild(el);cards.push({el,data});drawConn();
}
INITIAL_CARDS.forEach(createCard);

document.getElementById('fileInput').addEventListener('change',(e)=>{
  Array.from(e.target.files).forEach(file=>{const reader=new FileReader();reader.onload=(ev)=>{const imgEl=new Image();imgEl.onload=()=>{const maxW=200,ratio=imgEl.naturalHeight/imgEl.naturalWidth,w=maxW,h=Math.round(maxW*ratio),bw=board.offsetWidth,bh=board.offsetHeight,x=Math.max(10,20+Math.random()*(bw-w-40)),y=Math.max(10,20+Math.random()*(bh-h-40)),author=currentAuthor();getAC(author);createCard({id:'c'+(++cardIdCnt),x,y,w,h,img:ev.target.result,author,notes:[]});};imgEl.src=ev.target.result;};reader.readAsDataURL(file);});
});
const ul=document.getElementById('upLabel');ul.addEventListener('dragover',e=>e.preventDefault());ul.addEventListener('drop',e=>{e.preventDefault();const dt=new DataTransfer();Array.from(e.dataTransfer.files).forEach(f=>dt.items.add(f));document.getElementById('fileInput').files=dt.files;document.getElementById('fileInput').dispatchEvent(new Event('change'));});
const noteBtn=document.getElementById('noteBtn');
noteBtn.addEventListener('click',()=>{modeNote=!modeNote;if(modeNote&&modeDelete){modeDelete=false;board.classList.remove('mode-delete');document.getElementById('delBtn').classList.remove('del-on');document.getElementById('delBtn').textContent='削除モード';}board.classList.toggle('mode-note',modeNote);noteBtn.classList.toggle('on',modeNote);noteBtn.textContent=modeNote?'付箋モード中…':'付箋モード';if(modeNote)closeNotes();});
board.addEventListener('click',(e)=>{if(!modeNote){if(!e.target.classList.contains('note-dot'))closeNotes();return;}const br=board.getBoundingClientRect(),bx=e.clientX-br.left,by=e.clientY-br.top,color=randColor(),nid='n'+(++noteIdCnt),author=currentAuthor();getAC(author);const note={id:nid,bx:0,by:0,text:'ダブルクリックで編集',color,author};let target=null;cards.forEach(({el,data})=>{if(bx>=data.x&&bx<=data.x+data.w&&by>=data.y&&by<=data.y+data.h+10)target={el,data};});if(target){note.bx=Math.max(0,Math.min(target.data.w-18,bx-target.data.x-9));note.by=Math.max(0,Math.min(target.data.h-18,by-target.data.y-9));target.data.notes.push(note);target.el.appendChild(makeDot(note,target.data));}else{const fd={id:'free'+nid,x:bx-9,y:by-9,w:0,h:0,notes:[note],author};const dot=makeDot(note,fd);dot.style.cssText=`position:absolute;left:${bx-9}px;top:${by-9}px;background:${color.bg};border-color:${color.bd};width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.15);cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(0,0,0,0.4);`;board.appendChild(dot);}modeNote=false;board.classList.remove('mode-note');noteBtn.classList.remove('on');noteBtn.textContent='付箋モード';});
document.getElementById('edSave').addEventListener('click',()=>{if(!editing)return;const{note,cd,dot,pop}=editing;note.text=document.getElementById('edBody').value;note.color=COLORS[selColor];dot.style.background=note.color.bg;dot.style.borderColor=note.color.bd;pop.style.background=note.color.bg;pop.style.border=`1px solid ${note.color.bd}`;pop.style.color=note.color.tx;const del=buildPopContent(pop,note);del.addEventListener('click',(e)=>{e.stopPropagation();dot.remove();pop.remove();cd.notes=cd.notes.filter(n=>n.id!==note.id);});modalOverlay.classList.remove('open');editing=null;});
document.getElementById('edCancel').addEventListener('click',()=>{modalOverlay.classList.remove('open');editing=null;});
document.getElementById('shuffleBtn').addEventListener('click',()=>{const bw=board.offsetWidth,bh=board.offsetHeight;cards.forEach(({el,data})=>{const nx=20+Math.random()*(bw-data.w-60),ny=20+Math.random()*(bh-data.h-60);el.style.left=nx+'px';el.style.top=ny+'px';data.x=nx;data.y=ny;});closeNotes();drawConn();});
const delBtn=document.getElementById('delBtn');delBtn.addEventListener('click',()=>{modeDelete=!modeDelete;if(modeDelete&&modeNote){modeNote=false;board.classList.remove('mode-note');noteBtn.classList.remove('on');noteBtn.textContent='付箋モード';}board.classList.toggle('mode-delete',modeDelete);delBtn.classList.toggle('del-on',modeDelete);delBtn.textContent=modeDelete?'削除モード中':'削除モード';if(modeDelete)closeNotes();});
</script>
</body>
</html>
